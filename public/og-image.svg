        <circle cx="155" cy="-84" r="28"/>
        <circle cx="-132" cy="110" r="28"/>
        <circle cx="148" cy="118" r="28"/>
      </g>
    </g>

    <g transform="translate(72 484)">
      <rect width="478" height="66" rx="16" fill="#0f172a"/>
      <text x="25" y="41" fill="#fff" font-size="20" font-weight="650">搜尋公司名稱、股票代號與關係網路</text>
