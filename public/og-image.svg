    <text x="72" y="594" fill="#475569" font-size="18">taiwan-company-network.david888.com</text>
    <text x="1128" y="594" fill="#9a8d82" font-size="16" font-weight="700" letter-spacing="2" text-anchor="end">DAVID888</text>
