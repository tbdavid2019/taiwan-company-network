  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="14" fill="#2563eb"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif">
    <g transform="translate(72 66)">
      <rect width="50" height="50" rx="14" fill="#2563eb"/>
      <g transform="translate(11 9)" fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5">
        <path d="M14 8v9M4 30v-9h20v9"/>
        <circle cx="14" cy="5" r="3.5"/>
        <circle cx="4" cy="32" r="3.5"/>
        <circle cx="24" cy="32" r="3.5"/>
      </g>
      <text x="68" y="22" fill="#111827" font-size="23" font-weight="750">888台灣的公司關係網</text>
      <text x="68" y="44" fill="#64748b" font-size="14" letter-spacing="2">ENTITY EXPLORER</text>
    </g>

    <text x="72" y="230" fill="#111827" font-size="56" font-weight="800">探索臺灣公司的關係脈絡</text>
    <text x="72" y="286" fill="#475569" font-size="25">查詢公司登記資料，探索公司與法人之間的關係索引</text>

    <g transform="translate(850 322)" filter="url(#shadow)">
      <path d="M0 0-145-90M0 0 155-84M0 0-132 110M0 0 148 118" fill="none" marker-end="url(#arrow)" stroke="#b7aba0" stroke-width="4"/>
      <circle cx="0" cy="0" r="52" fill="#f3d3c7"/>
      <circle cx="0" cy="0" r="38" fill="#d97757" stroke="#fff" stroke-width="6"/>
      <g fill="#2f7d6d" stroke="#fff" stroke-width="5">
