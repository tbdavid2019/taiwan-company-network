<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taiwan Company Network</title>
    <script>
      (function (location) {
        var brokenGraph = location.href.match(/~\/graph~and~company=([^&#]+)/);
        if (brokenGraph) {
          location.replace(location.origin + "/graph?company=" + brokenGraph[1]);
          return;
        }
        var path = location.pathname.replace(/^\/+/, "");
        if (path.indexOf("taiwan-company-network/") === 0) {
          path = path.slice("taiwan-company-network/".length);
        }
        var query = location.search
          ? "&" + location.search.slice(1).replace(/&/g, "~and~")
          : "";
        location.replace(
          location.origin + "/?/" +
          path.replace(/&/g, "~and~") + query + location.hash,
        );
      }(window.location));
    </script>
  </head>
  <body>Loading Taiwan Company Network…</body>
</html>
